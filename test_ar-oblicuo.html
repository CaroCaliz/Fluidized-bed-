<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Test Cilindro AR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    html,body{margin:0;overflow:hidden;width:100%;height:100%;}
  </style>
</head>
<body>
  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; maxDetectionRate: 60;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
  >
    <a-marker
      preset="hiro"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <!-- Base plana sobre el marcador -->
      <a-cylinder
        position="0 0.05 0"
        radius="0.5" height="0.1"
        color="#334155" opacity="0.9">
      </a-cylinder>

      <!-- Reactor: caja rectangular en lugar de cilindro
           Una caja se ve mejor en perspectiva oblicua -->
      <a-box
        id="reactor"
        position="0 1.2 0"
        width="1.0" height="2.4" depth="1.0"
        color="#7dd3fc"
        opacity="0.08"
        side="double">
      </a-box>

      <!-- Bordes visibles de la caja -->
      <a-box
        position="0 1.2 0"
        width="1.02" height="2.42" depth="1.02"
        color="#5eead4"
        opacity="0.3"
        wireframe="true">
      </a-box>

      <!-- Cubo rojo de prueba visible dentro -->
      <a-box position="0 0.5 0" scale="0.3 0.3 0.3" color="red"></a-box>

    </a-marker>
    <a-entity
      camera
      look-controls="enabled: false"
      wasd-controls="enabled: false"
    ></a-entity>
  </a-scene>
</body>
</html>
