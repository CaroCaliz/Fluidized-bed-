<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Lecho Fluidizado AR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    html,body{margin:0;overflow:hidden;width:100%;height:100%;}
  </style>
</head>
<body>
  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; maxDetectionRate: 60;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
  >
    <a-marker preset="hiro">
      <!-- Base -->
      <a-cylinder
        position="0 0.05 0"
        radius="0.45" height="0.1"
        color="#1f2937">
      </a-cylinder>

      <!-- Cilindro reactor -->
      <a-cylinder
        position="0 1.1 0"
        radius="0.4" height="1.8"
        color="#60a5fa"
        opacity="0.3">
      </a-cylinder>

      <!-- Bordes -->
      <a-cylinder
        position="0 1.1 0"
        radius="0.42" height="1.82"
        color="#3b82f6"
        opacity="0.5"
        wireframe="true">
      </a-cylinder>

      <!-- Tapa -->
      <a-cylinder
        position="0 1.95 0"
        radius="0.4" height="0.05"
        color="#374151">
      </a-cylinder>

      <!-- Partículas individuales -->
      <a-sphere position="0 0.8 0" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="0.15 0.9 0.1" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.2 1.0 -0.15" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="0.1 1.2 0.2" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.15 1.4 0" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="0.2 1.5 -0.1" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.1 1.6 0.15" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="0.3 0.7 0" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.25 0.9 0.2" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>
      <a-sphere position="0 1.3 -0.25" scale="0.08 0.08 0.08" color="#fbbf24"></a-sphere>

    </a-marker>

    <a-entity camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
  </a-scene>
</body>
</html>
