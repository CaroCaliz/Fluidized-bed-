<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Lecho Fluidizado AR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    html,body{margin:0;overflow:hidden;width:100%;height:100%;}
  </style>
  <script>
    // Script para generar partículas dentro del cilindro
    AFRAME.registerComponent('particle-generator', {
      init: function() {
        const entity = this.el;
        const scene = entity.sceneEl;
        
        // Generar partículas aleatorias dentro del cilindro
        for (let i = 0; i < 30; i++) {
          const particle = document.createElement('a-sphere');
          
          // Posición aleatoria dentro del cilindro
          const angle = Math.random() * Math.PI * 2;
          const radius = Math.random() * 0.35; // Radio del cilindro es 0.4
          const height = Math.random() * 1.8 - 0.9; // Entre -0.9 y 0.9 (altura 1.8)
          
          particle.setAttribute('position', {
            x: Math.cos(angle) * radius,
            y: height,
            z: Math.sin(angle) * radius
          });
          
          particle.setAttribute('scale', '0.08 0.08 0.08');
          particle.setAttribute('color', '#fbbf24');
          particle.setAttribute('opacity', '0.9');
          
          entity.appendChild(particle);
        }
      }
    });
  </script>
</head>
<body>
  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; maxDetectionRate: 60;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
  >
    <a-marker
      preset="hiro"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <!-- Base plana sobre el marcador -->
      <a-cylinder
        position="0 0.05 0"
        radius="0.45" height="0.1"
        color="#1f2937" opacity="0.95">
      </a-cylinder>

      <!-- Cilindro principal del reactor fluidizado -->
      <a-cylinder
        id="reactor"
        position="0 1.1 0"
        radius="0.4" height="1.8"
        color="#60a5fa"
        opacity="0.3"
        side="double">
      </a-cylinder>

      <!-- Bordes del cilindro para mejor visualización -->
      <a-cylinder
        position="0 1.1 0"
        radius="0.42" height="1.82"
        color="#3b82f6"
        opacity="0.5"
        wireframe="true">
      </a-cylinder>

      <!-- Contenedor para las partículas -->
      <a-entity
        id="particles-container"
        position="0 1.1 0"
        particle-generator>
      </a-entity>

      <!-- Tapa superior del cilindro -->
      <a-cylinder
        position="0 1.95 0"
        radius="0.4" height="0.05"
        color="#374151" opacity="0.8">
      </a-cylinder>

    </a-marker>
    <a-entity
      camera
      look-controls="enabled: false"
      wasd-controls="enabled: false"
    ></a-entity>
  </a-scene>
</body>
</html>
