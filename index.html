<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Lecho Fluidizado AR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene embedded arjs>
    <a-marker preset="hiro">
      <!-- Base -->
      <a-cylinder position="0 0.05 0" radius="0.45" height="0.1" color="#1f2937"></a-cylinder>

      <!-- Cilindro reactor principal -->
      <a-cylinder position="0 1.1 0" radius="0.4" height="1.8" color="#60a5fa" opacity="0.4"></a-cylinder>

      <!-- Bordes del cilindro -->
      <a-cylinder position="0 1.1 0" radius="0.41" height="1.8" color="#0066cc" wireframe="true"></a-cylinder>

      <!-- Tapa -->
      <a-cylinder position="0 1.95 0" radius="0.4" height="0.05" color="#374151"></a-cylinder>

      <!-- Partículas amarillas -->
      <a-sphere position="0 0.8 0" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="0.15 0.9 0.1" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.2 1.0 -0.15" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="0.1 1.2 0.2" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.15 1.4 0" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="0.2 1.5 -0.1" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.1 1.6 0.15" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="0.3 0.7 0" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="-0.25 0.9 0.2" radius="0.04" color="#fbbf24"></a-sphere>
      <a-sphere position="0 1.3 -0.25" radius="0.04" color="#fbbf24"></a-sphere>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    console.log("Página cargada - AR.js iniciado");
  </script>
</body>
</html>
