<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Test AR Hiro</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
  >
    <a-marker preset="hiro">
      <a-box position="0 0.5 0" color="#ff0000"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Espera a que AR.js inyecte el video y canvas, luego los ajusta
    function fixLayout() {
      const video = document.querySelector('video');
      const canvas = document.querySelector('canvas');
      const W = window.innerWidth;
      const H = window.innerHeight;

      if (video) {
        video.style.position = 'fixed';
        video.style.top = '0';
        video.style.left = '0';
        video.style.width = W + 'px';
        video.style.height = H + 'px';
        video.style.objectFit = 'cover';
        video.style.zIndex = '0';
      }

      if (canvas) {
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        canvas.style.zIndex = '1';
      }

      // Si aún no aparecieron, reintenta
      if (!video || !canvas) {
        setTimeout(fixLayout, 200);
      }
    }

    // Inicia cuando la escena AR esté lista
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      setTimeout(fixLayout, 500);
    });

    // También reajusta si cambia el tamaño de pantalla
    window.addEventListener('resize', fixLayout);
  </script>
</body>
</html>
