<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Test AR Hiro</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    a-scene { width: 100vw; height: 100vh; display: block; }
    canvas { width: 100vw !important; height: 100vh !important; }
    video  { width: 100vw !important; height: 100vh !important;
             object-fit: cover !important; position: fixed !important;
             top: 0 !important; left: 0 !important; z-index: -1 !important; }
  </style>
</head>
<body>
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
  >
    <a-marker preset="hiro">
      <a-box position="0 0.5 0" scale="1 1 1" color="#ff0000" opacity="1"></a-box>
      <a-sphere position="0 1.5 0" radius="0.4" color="#00ff00" opacity="1"></a-sphere>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
